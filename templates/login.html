{% extends 'base.html' %}
{% block title %}Login — Card Benefits{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-8 col-md-5 col-lg-4">
    <div class="card p-4">
      <h4 class="mb-3"><i class="bi bi-lock-fill me-2"></i>Sign In</h4>
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-control" autocomplete="email" autofocus required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary w-100">Sign In</button>
      </form>
      <div class="mt-3 text-center">
        <a href="{{ url_for('forgot_password') }}" class="small text-muted">Forgot password?</a>
      </div>
      {% if signup_enabled %}
      <div class="mt-2 text-center small text-muted">
        New here? <a href="{{ url_for('signup') }}">Create an account</a>
      </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
