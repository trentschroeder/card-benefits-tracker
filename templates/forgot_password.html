{% extends 'base.html' %}
{% block title %}Forgot password — Card Benefits{% endblock %}
{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-sm-8 col-md-6 col-lg-4">
    <div class="card p-4">
      <h4 class="mb-3"><i class="bi bi-key me-2"></i>Forgot password</h4>
      <p class="text-muted">
        Enter your account email. If we recognize it, we'll send a link to reset your password.
      </p>
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-control" autocomplete="email" autofocus required>
        </div>
        <button class="btn btn-primary w-100">Send reset link</button>
      </form>
      <div class="mt-3 text-center">
        <a href="{{ url_for('login') }}" class="small text-muted">Back to sign in</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
