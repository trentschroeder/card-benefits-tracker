{% extends 'base.html' %}
{% block title %}Create account — Card Benefits{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-8 col-md-5 col-lg-4">
    <div class="card p-4">
      <h4 class="mb-3"><i class="bi bi-person-plus me-2"></i>Create your account</h4>
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-control" autocomplete="email"
                 value="{{ email }}" autofocus required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control"
                 autocomplete="new-password" required minlength="8">
          <div class="form-text">At least 8 characters.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm password</label>
          <input name="confirm_password" type="password" class="form-control"
                 autocomplete="new-password" required minlength="8">
        </div>
        <button class="btn btn-primary w-100">Create account</button>
      </form>
      <div class="mt-3 text-center small text-muted">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
