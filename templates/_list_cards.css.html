<style>
  /* ── Card section wrapper ──────────────────────────────── */
  .card-section {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    overflow: hidden;
  }
  .card-section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-color);
  }
  /* Leading tinted icon, matching the Offers/Subscriptions card icon */
  .card-section-icon {
    flex: 0 0 auto; width: 36px; height: 36px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center; font-size: 1.05rem;
    color: var(--bs-link-color, #1a3c8a);
    background: color-mix(in srgb, var(--bs-link-color, #1a3c8a) 16%, transparent);
    border: 1px solid color-mix(in srgb, var(--bs-link-color, #1a3c8a) 30%, transparent);
  }
  .card-section-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text-primary);
    flex: 1 1 auto;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-section-stats {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: .78rem;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cs-stat-captured { color: var(--text-primary); font-weight: 700; }
  .card-section-edit {
    width: 30px; height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    color: var(--text-muted);
    text-decoration: none;
    flex-shrink: 0;
    transition: background .12s, color .12s;
  }
  .card-section-edit:hover { background: var(--bg-input); color: var(--text-primary); }
  .card-section-body { padding: 12px 0 0; }

  /* ── Benefit rows ──────────────────────────────────────── */
  .benefit-list {
    border-top: 1px solid var(--border-color);
  }
  .benefit-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border-color);
    transition: background .12s;
  }
  .benefit-row:last-child { border-bottom: none; }
  .benefit-row:hover { background: color-mix(in srgb, var(--bg-card) 92%, var(--text-primary) 8%); }
  .benefit-row.benefit-row-msg {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .benefit-row.row-urgent-high { background: var(--tile-hi-bg); }
  .benefit-row.row-urgent-med  { background: var(--tile-med-bg); }

  .row-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .row-name {
    flex: 1 1 0;
    min-width: 0;
    font-size: .85rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-period {
    font-size: .7rem;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
    width: 80px;
    text-align: right;
  }
  .row-bar-wrap {
    flex-shrink: 0;
    width: 72px;
  }
  .row-bar-wrap .progress { height: 5px; }
  .row-amount {
    font-size: .72rem;
    color: var(--text-muted);
    text-align: right;
    white-space: nowrap;
    flex-shrink: 0;
    width: 72px;
  }
  .row-amount.remaining { color: var(--text-primary); font-weight: 600; }

  /* Tinted pill, matching the Offers "days left" pill vocabulary */
  .days-badge {
    display: inline-block;
    font-size: .65rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 38px;
    text-align: center;
  }
  .days-badge-high { background: color-mix(in srgb, #dc2626 22%, transparent); color: #f1556b; }
  .days-badge-med  { background: color-mix(in srgb, #ea7317 24%, transparent); color: #f08a2c; }
  .days-badge-low  { background: color-mix(in srgb, var(--text-muted) 18%, transparent); color: var(--text-muted); }
  .days-badge-done { background: color-mix(in srgb, #16a34a 22%, transparent); color: #16a34a; }

  .row-action {
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }
  .btn-add {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    background: transparent;
    color: var(--text-muted);
    font-size: .9rem;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .12s;
    padding: 0;
  }
  .btn-add:hover { border-color: #0d6efd; color: #0d6efd; background: rgba(13,110,253,.07); }
  [data-theme="ai"] .btn-add:hover { border-color: #00e5ff; color: #00e5ff; background: rgba(0,200,255,.1); }

  .row-info-icon {
    color: var(--border-color);
    font-size: .7rem;
    cursor: default;
    flex-shrink: 0;
  }
  .row-info-icon:hover { color: var(--text-muted); }

  /* ── Done/auto footer row ──────────────────────────────── */
  .done-footer {
    background: var(--bg-card);
    padding: 6px 14px;
    border-top: 1px solid var(--border-color);
    font-size: .75rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    border-radius: 0 0 16px 16px;
  }
  .done-footer:hover { color: var(--text-primary); }
  .done-section { border-top: 1px dashed var(--border-color); }
  .done-row { opacity: .6; }
  .done-row:hover { opacity: .85; }
  /* Done/ignored rows sit faded and easy to overlook — give them a touch
     more size on desktop so they stay scannable. Scoped to desktop because
     the mobile grid already renders these rows larger. */
  @media (min-width: 769px) {
    .done-row { padding-top: 10px; padding-bottom: 10px; }
    .done-row .row-name   { font-size: .92rem; }
    .done-row .row-period,
    .done-row .row-amount { font-size: .78rem; }
  }

  /* ── AI pulsing ────────────────────────────────────────── */
  @keyframes dotPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(220,53,69,.6); }
    50%      { box-shadow: 0 0 0 4px rgba(220,53,69,0); }
  }
  [data-theme="ai"] .row-dot.dot-high { animation: dotPulse 2s ease-in-out infinite; }

  /* ── ROI merged bar ────────────────────────────────────── */
  .roi-wrap { padding: 0 16px 12px; }
  .roi-bar-outer { position: relative; }
  .roi-progress { height: 8px !important; border-radius: 4px; }
  .roi-fee-tick {
    position: absolute;
    top: -1px;
    width: 2px;
    height: 10px;
    background: var(--text-muted);
    border-radius: 1px;
    transform: translateX(-50%);
    opacity: .7;
  }
  [data-theme="ai"] .roi-fee-tick { background: #7090c0; }
  .roi-verdict {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    font-size: .78rem;
  }

  /* ── Desktop: two-column card grid ─────────────────────────
     Masonry-style via CSS columns so cards of different heights pack
     tightly. Applied (via the .wallet-grid class) only when there's more
     than one card, so a lone card still spans the full width. */
  @media (min-width: 992px) {
    .wallet-grid { column-count: 2; column-gap: 1.5rem; }
    .wallet-grid > .card-section {
      break-inside: avoid;
      -webkit-column-break-inside: avoid;
      page-break-inside: avoid;
    }
  }
  /* ── Desktop: let the usage bar absorb the row's dead space ──
     Names keep a consistent width; the progress bar grows to fill the gap
     between the name and the right-hand figures. (Mobile uses a grid.) */
  @media (min-width: 769px) {
    .row-name { flex: 0 1 220px; }
    .row-bar-wrap { flex: 1 1 0; width: auto; min-width: 90px; }
  }

  /* ── Mobile: iOS-native 2-line cells ────────────────────
     Each benefit row becomes a roomy cell with name on top,
     "period · amount · days-badge" subtitle underneath, and a
     large 44px circular tap target for recording a redemption.
     Layout uses a 5-column grid:
       col1 dot | col2 period | col3 amount | col4 badge | col5 spacer/action
       row1: dot, name (spans cols 2-4), action
       row2: dot, period, amount, badge, (action) */
  @media (max-width: 768px) {
    .benefit-row {
      display: grid;
      grid-template-columns: auto auto auto auto minmax(0, 1fr) auto;
      grid-template-rows: auto auto;
      column-gap: 6px;
      row-gap: 1px;
      padding: 10px 14px;
      min-height: 64px;
      align-items: center;
    }
    .row-dot {
      grid-row: 1 / 3;
      grid-column: 1;
      align-self: center;
      justify-self: center;
      width: 10px;
      height: 10px;
      margin-right: 4px;
    }
    .row-name {
      grid-row: 1;
      grid-column: 2 / 6;
      align-self: end;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.25;
      padding-bottom: 1px;
    }
    .row-period {
      grid-row: 2;
      grid-column: 2;
      align-self: start;
      justify-self: start;
      width: auto;
      text-align: left;
      font-size: .8rem;
      line-height: 1.25;
    }
    .row-amount {
      grid-row: 2;
      grid-column: 3;
      align-self: start;
      justify-self: start;
      width: auto;
      text-align: left;
      font-size: .8rem;
      line-height: 1.25;
    }
    .row-amount::before {
      content: '·';
      margin: 0 6px 0 0;
      color: var(--text-muted);
      opacity: .7;
    }

    .row-bar-wrap { display: none !important; }

    /* Days badge becomes a compact pill in the subtitle row */
    .days-badge {
      grid-row: 2;
      grid-column: 4;
      align-self: start;
      justify-self: start;
      font-size: .65rem;
      padding: 2px 6px;
      min-width: 0;
      margin-left: 6px;
      line-height: 1.4;
    }
    .row-action {
      grid-row: 1 / 3;
      grid-column: 6;
      align-self: center;
      width: 44px;
      margin-left: 4px;
    }
    .btn-add {
      width: 44px;
      height: 44px;
      border-radius: 22px;
      border: none;
      background: #007aff;
      color: #fff;
      font-size: 1.6rem;
      font-weight: 300;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .18);
      transition: transform .08s, box-shadow .15s;
    }
    .btn-add:hover,
    .btn-add:focus,
    .btn-add:active {
      background: #0a84ff;
      color: #fff;
      border: none;
    }
    .btn-add:active { transform: scale(.92); }
    /* Press feedback on the other tappable bits of a card row */
    .card-section-edit:active { transform: scale(.9); }
    .row-name:active { opacity: .55; }
    [data-theme="ai"] .btn-add {
      background: linear-gradient(135deg, #00c8ff 0%, #c060ff 100%);
      box-shadow: 0 0 14px rgba(0, 200, 255, .45);
    }
    [data-theme="ai"] .btn-add:hover,
    [data-theme="ai"] .btn-add:focus,
    [data-theme="ai"] .btn-add:active {
      background: linear-gradient(135deg, #00c8ff 0%, #c060ff 100%);
      box-shadow: 0 0 22px rgba(0, 200, 255, .7);
    }

    /* Tooltip info icon: keep small inline next to name */
    .row-info-icon { font-size: .85rem; }

    /* Card header becomes a grid:
       row1: [icon] title + edit pencil (right);  row2: stats spanning all cols */
    .card-section-header {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      grid-template-rows: auto auto;
      column-gap: 8px;
      row-gap: 4px;
      align-items: center;
    }
    .card-section-icon   { grid-column: 1; grid-row: 1; }
    .card-section-title  { grid-column: 2; grid-row: 1; }
    .card-section-edit   { grid-column: 3; grid-row: 1; }
    .card-section-stats {
      grid-column: 1 / 4;
      grid-row: 2;
      flex-basis: auto;
      padding-left: 46px;
      font-size: .72rem;
      gap: 10px;
    }
  }
</style>
<style>
  /* Collapsible "inactive/done" footer chevron (Bootstrap collapse variant
     used by Offers/Subscriptions; dashboard uses its own JS toggler). */
  .done-footer .chev { transition: transform .2s; }
  .done-footer[aria-expanded="true"] .chev { transform: rotate(90deg); }
</style>
